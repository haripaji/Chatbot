<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veda Smart Bot AI</title>
<style>
    :root {
        --bg: #0b0b0b;
        --card: #1a1a1a;
        --user-msg: #007bff;
        --bot-msg: #2d2d2d;
        --accent: linear-gradient(45deg, #ff80ab, #7e57c2);
    }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; }
    #menu { padding: 15px; font-size: 24px; cursor: pointer; position: sticky; top: 0; background: var(--bg); z-index: 5; }
    #sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: var(--card); padding: 20px; transition: .4s; z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
    #sidebar.open { left: 0; }
    .btn { display: block; width: 100%; margin: 10px 0; padding: 12px; background: #333; border: none; color: #fff; border-radius: 12px; cursor: pointer; text-align: left; font-size: 16px; transition: 0.3s; }
    .btn:hover { background: #444; }
    #chat { height: 80vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.5; position: relative; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 2px; }
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
    .typing { font-size: 12px; color: #aaa; margin-left: 10px; display: none; }
    #inputArea { position: fixed; bottom: 0; width: 100%; display: flex; gap: 8px; padding: 15px; background: var(--bg); box-sizing: border-box; }
    #input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
    .icon-btn { width: 48px; height: 48px; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
    #mic { background: var(--accent); }
    #mic.glow { box-shadow: 0 0 15px #ff80ab; transform: scale(1.1); }
    #send { background: #007bff; color: white; }
    #credit { text-align: center; font-size: 10px; color: #555; padding-bottom: 5px; background: var(--bg); }
</style>
</head>
<body>

<div id="menu">☰</div>

<div id="sidebar">
    <h3 style="margin-top:0">Veda AI Settings</h3>
    <button class="btn" onclick="toggleSidebar()">⬅ Close Menu</button>
    <button class="btn" onclick="clearHistory()">🗑 Clear Chat</button>
    <button class="btn" onclick="window.location.href='mailto:harendrashrivastav44@gmail.com'">📩 Feedback</button>
    <p style="font-size: 12px; color: #777; margin-top: 20px;">Veda Bot v1.0 (AI Powered)</p>
</div>

<div id="chat">
    <div class="msg bot">Namaste! 🙏 Main Veda AI hoon. Main aapki kaise madad kar sakta hoon?</div>
</div>
<div id="typingIndicator" class="typing">Veda is thinking...</div>

<div id="inputArea">
    <button id="mic" class="icon-btn">🎤</button>
    <input id="input" placeholder="Kuch bhi puchiye..." autocomplete="off">
    <button id="send" class="icon-btn">➤</button>
</div>
<div id="credit">Powered by Gemini AI | Version 1.0.2</div>

<script>
// ===== CONFIGURATION =====
const API_KEY = "PASTE_YOUR_KEY_HERE"; // Gemini API Key
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const mic = document.getElementById("mic");
const sendBtn = document.getElementById("send");
const sidebar = document.getElementById("sidebar");
const menu = document.getElementById("menu");
const typingIndicator = document.getElementById("typingIndicator");

// ===== UI LOGIC =====
const toggleSidebar = () => sidebar.classList.toggle("open");
menu.onclick = toggleSidebar;

function addMessage(text, type){
    const d = document.createElement("div");
    d.className = "msg " + type;
    d.innerText = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    if(type === 'bot') speak(text); // Speak response
}

// ===== AI + UTILS =====
async function getAIResponse(prompt){
    typingIndicator.style.display = "block";

    // ----- Banking/Utility commands -----
    prompt = prompt.toLowerCase();
    if(prompt.includes("balance") || prompt.includes("bank") || prompt.includes("account")){
        typingIndicator.style.display = "none";
        const balance = await fakeBankAPI();
        return `Aapka bank balance hai ₹${balance} 🏦`;
    }
    if(prompt.includes("joke") || prompt.includes("hasao")){
        typingIndicator.style.display = "none";
        return rand(["😂 Teacher ne homework poocha, student bola dog ne khaya!","🤣 Bug hi life ban gaya","😆 Computer ko thand lag gayi"]);
    }
    if(prompt.includes("time") || prompt.includes("samay")){
        typingIndicator.style.display = "none";
        return "Abhi ka time hai: " + new Date().toLocaleTimeString();
    }

    // ----- Gemini API call -----
    try{
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] })
        });
        const data = await response.json();
        typingIndicator.style.display = "none";
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Kuch samajh nahi aaya 😅";
    }catch(e){
        typingIndicator.style.display = "none";
        console.error(e);
        return "Maaf kijiye, response nahi aa raha. API key check karein.";
    }
}

// ----- SEND MESSAGE -----
async function handleSend(){
    const text = input.value.trim();
    if(!text) return;
    addMessage(text, "user");
    input.value = "";
    const reply = await getAIResponse(text);
    addMessage(reply, "bot");
}

// ----- BUTTON EVENTS -----
sendBtn.onclick = handleSend;
input.onkeypress = (e) => { if(e.key === "Enter") handleSend(); };

// ===== VOICE LOGIC =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
    const rec = new SpeechRecognition();
    rec.lang = 'hi-IN';
    mic.onclick = () => { try{ rec.start(); } catch(e){console.log(e);} };
    rec.onstart = () => mic.classList.add("glow");
    rec.onend = () => mic.classList.remove("glow");
    rec.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        input.value = transcript;
        handleSend();
    };
}

// ===== CLEAR HISTORY =====
function clearHistory(){
    if(confirm("Kya aap chat history delete karna chahte hain?")){
        chat.innerHTML = '<div class="msg bot">Chat cleared. Main phir se taiyar hoon! 😊</div>';
        toggleSidebar();
    }
}

// ===== TEXT-TO-SPEECH =====
function speak(text){
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = "hi-IN";
    window.speechSynthesis.speak(msg);
}

// ===== UTILS =====
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function fakeBankAPI(){ return new Promise(res => setTimeout(()=>res(12345), 500)); }
</script>
</body>
</html>
