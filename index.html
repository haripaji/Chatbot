<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veda AI chatbot</title>
    <style>
        :root { --primary: #7c3aed; --bg: #0b0f1a; --card: #1e293b; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { padding: 15px; background: #0f172a; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .menu-icon { font-size: 24px; cursor: pointer; margin-right: 15px; color: var(--primary); padding: 5px; }
        .title { flex: 1; font-weight: bold; letter-spacing: 1px; font-size: 1.1rem; }
        .user-tag { font-size: 10px; opacity: 0.5; border: 1px solid rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; }

        /* Sidebar Menu */
        #sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: #0f172a; transition: 0.3s ease; z-index: 1000; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        #sidebar.active { left: 0; }
        .side-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: var(--card); border: none; color: white; border-radius: 12px; text-align: left; font-size: 14px; cursor: pointer; }
        .side-btn:active { background: var(--primary); }

        /* Chat Area */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2); }
        .bot { align-self: flex-start; background: var(--card); border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }

        /* Bottom Input bar */
        .input-box { padding: 15px; background: var(--bg); border-top: 1px solid rgba(255,255,255,0.05); }
        #wrapper { display: flex; align-items: center; background: var(--card); border-radius: 30px; padding: 5px 15px; gap: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; font-size: 16px; outline: none; }
        .icon { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 5px; }
        #send-btn { color: var(--primary); font-size: 24px; }
        .mic-on { color: #ef4444 !important; }
    </style>
</head>
<body>

<header>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div class="title">VEDA AI</div>
    <div id="display-id" class="user-tag">ID...</div>
</header>

<div id="sidebar">
    <h2 style="color:var(--primary); margin-bottom: 20px;">Menu</h2>
    <button class="side-btn" onclick="saveChatData()">💾 Save Chat</button>
    <button class="side-btn" onclick="sendFeedback()">📧 Feedback & Support</button>
    <button class="side-btn" onclick="location.reload()" style="background:#ef444422">🔄 Reset Chat</button>
    <div style="margin-top: auto; font-size: 10px; opacity: 0.3; text-align: center;">Veda Engine v1.0</div>
    <button class="side-btn" onclick="toggleMenu()" style="margin-top: 15px; background: #334155; text-align: center;">Close</button>
</div>

<div id="chat"></div>

<div class="input-box">
    <div id="wrapper">
        <button id="mic-btn" class="icon">🎤</button>
        <input type="text" id="user-input" placeholder="Message Veda..." autocomplete="off">
        <button id="send-btn" class="icon">➤</button>
    </div>
</div>

<script src="responses.js"></script>

<script>
    const chatContainer = document.getElementById('chat');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const sidebarMenu = document.getElementById('sidebar');

    // 1. UNIQUE PRIVACY ID
    const vedaID = "V-User-" + Math.floor(1000 + Math.random() * 9000);
    document.getElementById('display-id').innerText = vedaID;

    function toggleMenu() { sidebarMenu.classList.toggle('active'); }

    // 2. UNIVERSAL GET-REPLY (responses.js aur Calculation handles)
    function getReply(text) {
        text = text.toLowerCase().trim();

        // MATH HANDLER
        const mathChars = /^[0-9+\-*/().\s]+$/;
        if (mathChars.test(text) && /[0-9]/.test(text)) {
            try { return `Natija: ${eval(text)} 🔢`; } catch(e) { return "Calculation error. 😅"; }
        }

        // DATABASE HANDLER (Keyword matching)
        if (typeof vedaDatabase !== 'undefined') {
            for (let key in vedaDatabase) {
                if (text.includes(key.toLowerCase())) return vedaDatabase[key];
            }
        }

        // UNKNOWN QUESTION HANDLER (Admin Reporting)
        setTimeout(() => {
            const admin = "harendrashrivastav44@gmail.com";
            const body = `Veda-ID: ${vedaID}%0AQuestion: ${text}`;
            window.location.href = `mailto:${admin}?subject=Unknown Question Report&body=${body}`;
        }, 2500);

        return (typeof defaultResponse !== 'undefined') ? defaultResponse : "Maaf kijiye, mujhe iska jawab nahi mila. Maine ye report admin ko bhej di hai.";
    }

    // 3. UI MESSAGE & AUTO-VOICE
    function addMsg(text, type) {
        const d = document.createElement("div");
        d.className = `msg ${type}`;
        d.innerText = text;
        chatContainer.appendChild(d);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // AUTO-VOICE (Bot automatically speaks)
        if (type === "bot") {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'hi-IN';
            window.speechSynthesis.speak(speech);
        }
    }

    function processMessage() {
        const val = inputField.value.trim();
        if(!val) return;
        addMsg(val, "user");
        inputField.value = "";
        setTimeout(() => addMsg(getReply(val), "bot"), 600);
    }

    // 4. MENU ACTIONS (Save & Feedback)
    function saveChatData() {
        let log = `VEDA AI CHAT LOG\nID: ${vedaID}\n----------------\n`;
        document.querySelectorAll('.msg').forEach(m => {
            log += (m.classList.contains('user') ? "USER: " : "BOT: ") + m.innerText + "\n";
        });
        const blob = new Blob([log], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Veda_Data_${vedaID}.txt`;
        a.click();
    }

    function sendFeedback() {
        window.location.href = `mailto:harendrashrivastav44@gmail.com?subject=Feedback from ${vedaID}`;
    }

    // 5. MIC & VOICE INPUT
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
        const rec = new SpeechRec();
        rec.lang = "hi-IN";
        micBtn.onclick = () => { rec.start(); micBtn.classList.add('mic-on'); };
        rec.onend = () => micBtn.classList.remove('mic-on');
        rec.onresult = (e) => { inputField.value = e.results[0][0].transcript; processMessage(); };
    }

    // 6. EVENT LISTENERS
    sendBtn.onclick = processMessage;
    inputField.onkeypress = (e) => { if(e.key === "Enter") processMessage(); };

    window.onload = () => addMsg("Namaste! Main Veda AI hoon. Mai apki kya help hoon. 🔮", "bot");
</script>
</body>
</html>
