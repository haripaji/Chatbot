<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Smart AI - Expert v2.1</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        #menu-icon { font-size: 24px; cursor: pointer; color: var(--primary); transition: 0.3s; }
        #menu-icon:hover { transform: scale(1.1); }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: #0f172a; z-index: 200; transition: 0.4s ease;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        #sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }

        .side-btn {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #1e293b; border: 1px solid rgba(255,255,255,0.05); color: white;
            border-radius: 12px; cursor: pointer; text-align: left; transition: 0.3s;
        }
        .side-btn:hover { background: var(--primary); }

        /* Sidebar Branding Footer */
        .sidebar-footer {
            margin-top: auto;
            text-align: center;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        /* --- Chat Area --- */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: slideUp 0.3s ease-out;
            position: relative;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        /* Actions Button UI */
        .actions { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 15px; }
        .actions span { cursor: pointer; opacity: 0.6; transition: 0.2s; font-size: 16px; }
        .actions span:hover { opacity: 1; transform: scale(1.2); }

        /* --- Input --- */
        .input-box { padding: 20px; background: transparent; }
        #input-wrapper {
            max-width: 800px; margin: 0 auto; background: var(--card);
            padding: 8px 15px; border-radius: 30px; display: flex;
            align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);
        }

        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }

        .circle-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; background: rgba(255,255,255,0.05); color: white;
        }
        #send { background: var(--primary); }
        #mic.active { background: #ef4444; box-shadow: 0 0 15px #ef4444; }

    </style>
</head>
<body>

<header>
    <div id="menu-icon">☰</div>
    <div style="font-weight: 800; letter-spacing: 1.5px;">VEDA <span style="color:var(--primary)">AI</span></div>
    <div style="font-size: 10px; opacity: 0.4;">v2.1</div>
</header>

<div id="sidebar">
    <h3 style="color:var(--primary); margin-top: 0;">Veda Settings</h3>
    <button class="side-btn" onclick="toggleSidebar()">⬅ Back</button>
    <button class="side-btn" onclick="clearHistory()">🗑 Clear Chat</button>
    <button class="side-btn" onclick="location.reload()">🔄 Restart Bot</button>
    
    <div class="sidebar-footer">
        Created_by_thoughts_sounds
    </div>
</div>

<div id="chat">
    </div>

<div class="input-box">
    <div id="input-wrapper">
        <button id="mic" class="circle-btn">🎤</button>
        <input type="text" id="user-input" placeholder="Kuch naya poochiye..." autocomplete="off">
        <button id="send" class="circle-btn">➤</button>
    </div>
</div>

<script src="responses.js">
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send');
    const sidebar = document.getElementById('sidebar');
    const menuIcon = document.getElementById('menu-icon');
    const micBtn = document.getElementById('mic');

    // Menu Controls
    menuIcon.onclick = () => sidebar.classList.add('open');
    function toggleSidebar() { sidebar.classList.remove('open'); }

    // Welcome Msg
    window.onload = () => {
        addMessage("Namaste! Main Veda Smart AI hoon. Main aapki creative writing aur development mein help kar sakta hoon. 🔮", "bot");
    }

    // --- EXPERT LOGIC ---
    function getReply(text) {
        text = text.toLowerCase().trim();
        if(text.includes("hi") || text.includes("hello") || text.includes("namaste")) return "Hello! Aaj hum kis expert topic par kaam karein?";
        if(text.includes("code") || text.includes("html") || text.includes("js")) return "Coding mein logic hi sabkuch hai. Kya main aapka code review karoon?";
        if(text.includes("story") || text.includes("aryan") || text.includes("fantasy")) return "Historical fantasy aur chakra-tech world-building mera favourite hai. Boliye!";
        if(text.includes("joke") || text.includes("hasao")) return "Duniya mein 10 tarah ke log hote hain: Wo jo binary samajhte hain, aur wo jo nahi! 😂";
        return "Dilchasp baat hai! Thoda detail mein batayenge?";
    }

    function addMessage(text, type) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${type}`;
        
        const content = document.createElement("div");
        content.innerText = text;
        msgDiv.appendChild(content);

        if (type === "bot") {
            const actions = document.createElement("div");
            actions.className = "actions";
            actions.innerHTML = `
                <span title="Like" onclick="addMessage('Thanks for feedback! 😊', 'bot')">👍</span>
                <span title="Dislike" onclick="addMessage('Main sudhaar karne ki koshish karunga. 😅', 'bot')">👎</span>
                <span title="Copy" onclick="copyMsg('${text.replace(/'/g, "\\'")}')">📋</span>
                <span title="Speak" onclick="speakMsg('${text.replace(/'/g, "\\'")}')">🔊</span>
            `;
            msgDiv.appendChild(actions);
        }

        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function handleSend() {
        const val = userInput.value.trim();
        if (!val) return;
        addMessage(val, "user");
        userInput.value = "";
        
        setTimeout(() => {
            addMessage(getReply(val), "bot");
        }, 700);
    }

    sendBtn.onclick = handleSend;
    userInput.onkeypress = (e) => { if (e.key === "Enter") handleSend(); };

    // --- Helpers ---
    function copyMsg(t) {
        navigator.clipboard.writeText(t);
        alert("Text copied!");
    }

    function speakMsg(t) {
        const utter = new SpeechSynthesisUtterance(t);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    function clearHistory() {
        if(confirm("Kya aap poori chat mitaana chahte hain?")) {
            chat.innerHTML = '';
            toggleSidebar();
        }
    }

    // --- Voice Recognition ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "hi-IN";

    micBtn.onclick = () => recognition.start();
    recognition.onstart = () => micBtn.classList.add('active');
    recognition.onend = () => micBtn.classList.remove('active');
    recognition.onresult = (e) => {
        userInput.value = e.results[0][0].transcript;
        handleSend();
    };

    if(text.includes("story") || text.includes("creative")) return brain.creative[Math.floor(Math.random()*2)];
    if(text.includes("time")) return "Abhi " + new Date().toLocaleTimeString() + " ho raha hai.";
    
    return brain.fallback[Math.floor(Math.random()*3)];
}

// ===== MESSAGE UI =====
function addMessage(text, type) {
    let d = document.createElement("div");
    d.className = "msg " + type;
    d.innerText = text;

    if(type === "bot") {
        let actions = document.createElement("div");
        actions.className = "actions";
        actions.innerHTML = `<span onclick="copyTxt('${text}')">📋</span> <span onclick="speak('${text}')">🔊</span>`;
        d.appendChild(actions);
    }

    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
}

function copyTxt(t) { navigator.clipboard.writeText(t); alert("Copied!"); }

// ===== LOGIC =====
function sendMessage() {
    let t = input.value.trim();
    if(!t) return;
    addMessage(t, "user");
    input.value = "";
    
    setTimeout(() => {
        let r = getReply(t);
        addMessage(r, "bot");
    }, 600);
}

sendBtn.onclick = sendMessage;
input.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

// ===== VOICE & SPEECH =====
function speak(t) {
    let s = new SpeechSynthesisUtterance(t);
    s.lang = "hi-IN";
    window.speechSynthesis.speak(s);
}

const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = "hi-IN";
mic.onclick = () => rec.start();
rec.onstart = () => mic.classList.add("glow");
rec.onend = () => mic.classList.remove("glow");
rec.onresult = (e) => {
    input.value = e.results[0][0].transcript;
    sendMessage();
};

// ===== EXTRA =====
function clearHistory() { if(confirm("Clear chat?")) chat.innerHTML = ""; }
function feedback() { window.open("mailto:harendrashrivastav44@gmail.com"); }

        let dislike=document.createElement("span");
        dislike.innerText="👎";
        dislike.style.cursor="pointer";
        dislike.onclick=()=>addMessage("Sorry 😅 try again","bot");

        let copy=document.createElement("span");
        copy.innerText="📋";
        copy.style.cursor="pointer";
        copy.onclick=()=>navigator.clipboard.writeText(text);

        let speakBtn=document.createElement("span");
        speakBtn.innerText="🔊";
        speakBtn.style.cursor="pointer";
        speakBtn.onclick=()=>speak(text);

        actions.append(like,dislike,copy,speakBtn);
        d.appendChild(actions);
    }

    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
}

// ===== BRAIN =====
function getReply(text){

 text=clean(text);

 // ===== EXPERT BRAIN (UPGRADED) =====

// Expert Response Database
const expertData = {
    greetings: ["Namaste! Main Veda AI hoon, aapka conversation expert. Boliye kaise madad karoon?", "Hello! Ek naye aur intelligent discussion ke liye main taiyaar hoon.", "Swagat hai! Aaj hum kis baare mein baat karenge?"],
    coding: ["Logic build karna coding ki pehli seedhi hai. Kya aapko code optimize karna hai?", "Developer perspective se dekhein toh ye kaafi interesting sawal hai.", "Syntax ki chinta mat kijiye, pehle algorithm par dhyan dein."],
    creative: ["World-building ek art hai. Kya hum aapke 'Aryan' character ya 15th-century world par baat karein?", "Aapka creative vision kaafi unique hai. Ise aur expand karte hain."],
    ai_tech: ["AI fundamentals seekhna aaj ke samay mein bahut zaroori hai. Kya aapne apna roadmap shuru kiya?", "Neural networks aur logic hi AI ki jaan hai."],
    fallback: ["Hmm, main samajh raha hoon. Is par thoda aur detail mein baat karte hain?", "Interesting point! Kya aap ise thoda aur explain karenge?", "Main sun raha hoon, bataiye iske peeche ka kya logic hai?"]
};

function getReply(text) {
    text = text.toLowerCase().trim();

    // 1. NAME SETTING LOGIC
    if (text.includes("mera naam") || text.includes("my name is")) {
        let n = text.split(" ").pop();
        userData.name = n;
        localStorage.setItem("name", n);
        return `Aapse milkar khushi hui, ${n}! Main aapka naam yaad rakhunga.`;
    }

    // 2. EXPERT CONTEXT MATCHING
    if (match(text, ["hi", "hello", "namaste", "hey"])) {
        return rand(expertData.greetings);
    }
    
    if (match(text, ["kaise ho", "how are you"])) {
        return "Main ek Expert AI hoon, hamesha ki tarah optimize aur fast! Aap kaise hain?";
    }

    if (match(text, ["code", "html", "javascript", "fix", "developer"])) {
        return rand(expertData.tech);
    }

    if (match(text, ["story", "novel", "fantasy", "aryan", "chakra"])) {
        return rand(expertData.creative);
    }

    if (match(text, ["ai", "robot", "intelligence", "machine"])) {
        return rand(expertData.ai_tech);
    }

    if (match(text, ["joke", "hasao", "funny"])) {
        return rand([
            "Ek programmer ki life: 10% coding, 90% dhoondhna ki error kahan hai! 😂",
            "Teacher: 2+2 kitna hota hai? Coder: Pehle ye batao ki data type 'Int' hai ya 'String'? 😆",
            "Why do programmers prefer dark mode? Because light attracts bugs! 🤣"
        ]);
    }

    if (match(text, ["time", "samay", "date"])) {
        return "Abhi ka samay hai: " + new Date().toLocaleTimeString();
    }

    // 3. SMART FALLBACK (Expert Style)
    let r = rand(expertData.fallback);
    return (userData.name) ? `${userData.name}, ${r.toLowerCase()}` : r;
}

// ===== IMPROVED SEND & DISPLAY =====
function sendMessage() {
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // Expert style delay for realistic feel
    setTimeout(() => {
        let reply = getReply(text);
        addMessage(reply, "bot");
        
        // Agar voice mode on hai toh bol kar bataye
        if(voiceMode) speak(reply);
    }, 800);
}


// ===== BUTTON EVENTS =====
sendBtn.onclick=sendMessage;
input.addEventListener("keypress",e=>{
 if(e.key==="Enter") sendMessage();
});

// ===== MIC =====
const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="en-IN";

mic.onclick=()=>rec.start();

rec.onstart=()=>mic.classList.add("glow");
rec.onend=()=>mic.classList.remove("glow");
rec.onerror=()=>mic.classList.remove("glow");

let voiceMode=false;

// ===== VOICE MODE =====
voiceBtn.onclick=()=>{
 voiceMode=!voiceMode;
 voiceBtn.innerText=voiceMode?"🛑":"🎧";
 if(voiceMode) rec.start();
};

// ===== SINGLE RESULT =====
rec.onresult=(e)=>{
 let text=e.results[0][0].transcript;

 if(!voiceMode){
  input.value=text;
  sendMessage();
 }else{
  addMessage(text,"user");
  let reply=getReply(text);
  addMessage(reply,"bot");
  speak(reply);
  setTimeout(()=>rec.start(),500);
 }
};

// ===== EXTRA =====
function clearHistory(){
 if(confirm("Clear chat?")) chat.innerHTML="";
}

function feedback(){
 window.location.href="mailto:harendrashrivastav44@gmail.com";
}

</script>
