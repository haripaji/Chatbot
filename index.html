<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Smart AI - Expert v2.1</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        #menu-icon { font-size: 24px; cursor: pointer; color: var(--primary); transition: 0.3s; }
        #menu-icon:hover { transform: scale(1.1); }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: #0f172a; z-index: 200; transition: 0.4s ease;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        #sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }

        .side-btn {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #1e293b; border: 1px solid rgba(255,255,255,0.05); color: white;
            border-radius: 12px; cursor: pointer; text-align: left; transition: 0.3s;
        }
        .side-btn:hover { background: var(--primary); }

        /* Sidebar Branding Footer */
        .sidebar-footer {
            margin-top: auto;
            text-align: center;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        /* --- Chat Area --- */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: slideUp 0.3s ease-out;
            position: relative;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        /* Actions Button UI */
        .actions { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 15px; }
        .actions span { cursor: pointer; opacity: 0.6; transition: 0.2s; font-size: 16px; }
        .actions span:hover { opacity: 1; transform: scale(1.2); }

        /* --- Input --- */
        .input-box { padding: 20px; background: transparent; }
        #input-wrapper {
            max-width: 800px; margin: 0 auto; background: var(--card);
            padding: 8px 15px; border-radius: 30px; display: flex;
            align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);
        }

        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }

        .circle-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; background: rgba(255,255,255,0.05); color: white;
        }
        #send { background: var(--primary); }
        #mic.active { background: #ef4444; box-shadow: 0 0 15px #ef4444; }

    </style>
</head>

        try {

            const result = eval(text);
            return `Calculation ka jawab hai: ${result} 🔢`;
        } catch (e) {
            return "Math expression mein thodi galti hai, please check karein. 😅";
        }
    }

    // 3. DYNAMIC DATABASE SCANNER: responses.js ki har 'Key' ko check karna
    // 'vedaDatabase' wahi object hai jo aapki responses.js mein hai
    if (typeof vedaDatabase !== 'undefined') {
        for (let key in vedaDatabase) {
            // Agar user ke sentence mein hamara 'Keyword' kahin bhi hai...
            if (text.includes(key.toLowerCase())) {
                return vedaDatabase[key]; // ...toh turant uska jawab do
            }
        }
    }

    // 4. FALLBACK: Agar math nahi hai aur database mein bhi keyword nahi mila
    // Ye 'defaultResponse' bhi responses.js se hi uthayega

        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${type}`;
        
        const content = document.createElement("div");
        content.innerText = text;
        msgDiv.appendChild(content);

        if (type === "bot") {
            const actions = document.createElement("div");
            actions.className = "actions";
            actions.innerHTML = `
                <span title="Like" onclick="addMessage('Thanks for feedback! 😊', 'bot')">👍</span>
                <span title="Dislike" onclick="addMessage('Main sudhaar karne ki koshish karunga. 😅', 'bot')">👎</span>
                <span title="Copy" onclick="copyMsg('${text.replace(/'/g, "\\'")}')">📋</span>
                <span title="Speak" onclick="speakMsg('${text.replace(/'/g, "\\'")}')">🔊</span>
            `;
            msgDiv.appendChild(actions);
        }

        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function handleSend() {
        const val = userInput.value.trim();
        if (!val) return;
        addMessage(val, "user");
        userInput.value = "";
        
        setTimeout(() => {
            addMessage(getReply(val), "bot");
        }, 700);
    }

    sendBtn.onclick = handleSend;
    userInput.onkeypress = (e) => { if (e.key === "Enter") handleSend(); };

    // --- Helpers ---
    function copyMsg(t) {
        navigator.clipboard.writeText(t);
        alert("Text copied!");
    }

    function speakMsg(t) {
        const utter = new SpeechSynthesisUtterance(t);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    function clearHistory() {
        if(confirm("Kya aap poori chat mitaana chahte hain?")) {
            chat.innerHTML = '';
            toggleSidebar();
        }
    }

    // --- Voice Recognition ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "hi-IN";

    micBtn.onclick = () => recognition.start();
    recognition.onstart = () => micBtn.classList.add('active');
    recognition.onend = () => micBtn.classList.remove('active');
    recognition.onresult = (e) => {
        userInput.value = e.results[0][0].transcript;
        handleSend();
    };

    if(text.includes("story") || text.includes("creative")) return brain.creative[Math.floor(Math.random()*2)];
    if(text.includes("time")) return "Abhi " + new Date().toLocaleTimeString() + " ho raha hai.";
    
    return brain.fallback[Math.floor(Math.random()*3)];
}

    }
