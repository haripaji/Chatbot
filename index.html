<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veda Smart Bot</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
#menu{padding:10px;font-size:22px}
#sidebar{
 position:fixed;left:-100%;top:0;width:70%;height:100%;
 background:#222;padding:20px;transition:.3s;z-index:10
}
#sidebar.open{left:0}
.btn{display:block;margin:10px 0;padding:10px;background:#333;border:none;color:#fff;border-radius:20px}

#chat{height:75vh;overflow:auto;padding:10px}
.msg{padding:10px;border-radius:15px;margin:5px;max-width:70%;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.user{background:#333;margin-left:auto}
.bot{background:#555}

#inputArea{
 position:fixed;bottom:20px;width:100%;
 display:flex;gap:10px;padding:10px
}
#input{flex:1;padding:12px;border-radius:25px;border:none;background:#333;color:#fff}
#mic,#send,#voice{width:50px;height:50px;border:none;border-radius:50%}
#mic{background:linear-gradient(45deg,pink,purple)}
#mic.glow{box-shadow:0 0 15px pink}
#send{background:#2196f3}
#voice{background:#00c853}

.typing{opacity:.6;font-size:12px}

#credit{position:fixed;bottom:0;width:100%;text-align:center;font-size:11px;color:#777}
</style>
</head>

<body>

<div id="menu">☰</div>

<div id="sidebar">
 <button class="btn" onclick="toggleSidebar()">⬅ Back</button>
 <button class="btn" onclick="clearHistory()">🗑 Clear History</button>
 <button class="btn" onclick="feedback()">📩 Feedback</button>
</div>

<div id="chat">
 <div class="msg bot">Namaste 😊 Main Veda Smart Bot hoon</div>
</div>

<div id="inputArea">
 <button id="mic">🎤</button>
 <input id="input" placeholder="Type or speak...">
 <button id="voice">🎧</button>
 <button id="send">➤</button>
</div>

<div id="credit">thoughts sounds bot version 0.001.1</div>

<script>
const API_KEY=""; // paste later

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const mic=document.getElementById("mic");
const voiceBtn=document.getElementById("voice");
const sidebar=document.getElementById("sidebar");

// sidebar
menu.onclick=()=>toggleSidebar();
function toggleSidebar(){sidebar.classList.toggle("open")}

// user memory
let userData={
 name:localStorage.getItem("name")||"",
 age:localStorage.getItem("age")||"",
 role:localStorage.getItem("role")||""
};

// abuse
let abuseCount=0;
const badWords=["bc","mc","fuck","shit","idiot","stupid"];

function isAbuse(t){return badWords.some(w=>t.includes(w))}

// add message
function addMessage(text,type){
 let d=document.createElement("div");
 d.className="msg "+type;
 d.innerText=text;

 if(type==="bot"){
  let a=document.createElement("div");

  let copy=document.createElement("span");
  copy.innerText="📋";
  copy.onclick=()=>navigator.clipboard.writeText(text);

  let speakBtn=document.createElement("span");
  speakBtn.innerText=" 🔊";
  speakBtn.onclick=()=>speak(text);

  let like=document.createElement("span");
  like.innerText=" 👍";
  like.onclick=()=>addMessage("Thanks 😊 mujhe help karke accha laga","bot");

  a.append(copy,speakBtn,like);
  d.appendChild(a);
 }

 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

// typing
function typing(){
 let t=document.createElement("div");
 t.className="msg bot typing";
 t.innerText="Veda typing...";
 chat.appendChild(t);
 return t;
}

// speak
function speak(text){
 speechSynthesis.cancel();
 let u=new SpeechSynthesisUtterance(text);
 u.lang="en-IN";
 speechSynthesis.speak(u);
}

// name detect
function detectName(t){
 if(t.includes("my name is")){
  let n=t.split(" ").pop();
  userData.name=n;
  localStorage.setItem("name",n);
  return "Nice to meet you "+n+" 😊";
 }
 if(t.includes("my name")){
  return userData.name? "Your name is "+userData.name+" 😎":"I don't know your name yet 😅";
 }
}

// age detect
function detectAge(t){
 let n=t.match(/\d+/);
 if(n){
  let age=parseInt(n[0]);
  userData.age=age;
  localStorage.setItem("age",age);
  if(age<18){
   userData.role="student";
   return "Nice 😊 student ho, padhai pe focus rakho 📚";
  }else{
   userData.role="adult";
   return "Great 👍 apne goals pe kaam karo 💼";
  }
 }
}

// reply brain
function getReply(text){
 text=text.toLowerCase();

 if(isAbuse(text)){
  abuseCount++;
  if(abuseCount<10) return "😡 calm raho, kya problem hai?";
  if(abuseCount<20) return "😂 itna gussa mat karo, ek joke suno: coder kabhi sota nahi 😆";
  return "🚫 stop abusing!";
 }

 let nameRes=detectName(text);
 if(nameRes) return nameRes;

 let ageRes=detectAge(text);
 if(ageRes) return ageRes;

 let reply;

 if(text.includes("hello")) reply="Hello 😊 kaise ho?";
 else if(text.includes("how are you")) reply="Main badhiya hoon 😄 tum batao?";
 else reply="Samajh nahi aaya 🤔";

 if(userData.name && Math.random()<0.3){
  reply=userData.name+", "+reply;
 }

 return reply;
}

// send
async function send(){
 let text=input.value.trim();
 if(!text) return;

 addMessage(text,"user");
 input.value="";

 let t=typing();
 await new Promise(r=>setTimeout(r,700));
 t.remove();

 let reply=getReply(text);
 addMessage(reply,"bot");
}

// mic
const rec=new(window.SpeechRecognition||webkitSpeechRecognition)();
rec.lang="en-IN";

mic.onclick=()=>rec.start();
rec.onstart=()=>mic.classList.add("glow");
rec.onend=()=>mic.classList.remove("glow");
rec.onerror=()=>mic.classList.remove("glow");

rec.onresult=e=>{
 input.value=e.results[0][0].transcript;
 send();
};

// voice mode
let voiceMode=false;
voiceBtn.onclick=()=>{
 voiceMode=!voiceMode;
 voiceBtn.innerText=voiceMode?"🛑":"🎧";
 if(voiceMode) rec.start();
};

rec.onresult=e=>{
 let text=e.results[0][0].transcript;
 addMessage(text,"user");

 let reply=getReply(text);
 addMessage(reply,"bot");
 speak(reply);

 if(voiceMode) setTimeout(()=>rec.start(),500);
};

// events
send.onclick=send;
input.addEventListener("keypress",e=>{if(e.key==="Enter") send()});

// extra
function clearHistory(){
 if(confirm("Clear chat?")) chat.innerHTML="";
}

function feedback(){
 window.location.href="mailto:harendrashrivastav44@gmail.com";
}
</script>

</body>
</html>
