<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veda / Ayra Assistant</title>

<style>
:root {
  --bg: #121212;
  --card: #1e1e1e;
  --primary: #0b84ff;
  --text: #ffffff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Header */
header {
  padding: 15px;
  text-align: center;
  background: var(--card);
}

/* Floating Menu Button */
#menu-btn {
  position: fixed;
  top: 70px;
  left: 10px;
  z-index: 1000;
  background: #333;
  color: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  border: none;
}

/* Sidebar */
#sidebar {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100%;
  background: #1a1a1a;
  padding: 15px;
  transition: 0.3s;
  z-index: 999;
}

#sidebar.open {
  left: 0;
}

/* Chat */
#chat-box {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 10px;
  border-radius: 15px;
  max-width: 75%;
}

.user { background: var(--primary); align-self: flex-end; }
.bot { background: var(--card); align-self: flex-start; }

/* Controls */
.controls {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display: flex;
  gap: 8px;
  padding: 10px;
  background: var(--bg);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #2c2c2e;
  color: white;
}

button {
  border-radius: 50%;
  width: 45px;
  height: 45px;
  border: none;
}

#mic-btn { background: red; }
#send-btn { background: var(--primary); color: white; }

/* Footer */
#credit {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color: #777;
}
</style>
</head>

<body>

<header>🤖 Veda / Ayra Assistant</header>

<button id="menu-btn">☰</button>

<div id="sidebar">
  <h3>Settings</h3>
  
  <button onclick="saveMode('Veda')">Set Veda Permanent</button><br><br>
  <button onclick="saveMode('Ayra')">Set Ayra Permanent</button><br><br>

  <input id="username" placeholder="Enter name"><br><br>
  <button onclick="saveUser()">Save User</button><br><br>

  <button onclick="clearHistory()">Clear History</button>
</div>

<div id="chat-box"></div>

<div class="controls">
  <button id="mic-btn">🎤</button>
  <input id="input" placeholder="Type or speak...">
  <button id="send-btn">➤</button>
</div>

<div id="credit">thoughts sounds bot version 0.001.1</div>

<script>
const API_KEY = "YOUR_API_KEY_HERE";

const chat = document.getElementById("chat-box");
const input = document.getElementById("input");

// sidebar toggle
document.getElementById("menu-btn").onclick = () => {
  document.getElementById("sidebar").classList.toggle("open");
};

// history load
window.onload = () => {
  let history = JSON.parse(localStorage.getItem("chat")) || [];
  history.forEach(m => addMessage(m.text, m.type));
};

// save history
function saveHistory(text, type) {
  let history = JSON.parse(localStorage.getItem("chat")) || [];
  history.push({text, type});
  localStorage.setItem("chat", JSON.stringify(history));
}

// clear history
function clearHistory() {
  localStorage.removeItem("chat");
  chat.innerHTML = "";
}

// add message
function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  saveHistory(text, type);
}

// fallback
function fallback(text) {
  return "Main abhi iska jawab nahi de pa raha hoon.";
}

// AI
async function getAI(text) {
  if (!API_KEY || API_KEY === "gen-lang-client-0203533754") return fallback(text);

  try {
    let res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [{role: "user", content: text}]
      })
    });

    let data = await res.json();
    return data.choices[0].message.content;

  } catch {
    return fallback(text);
  }
}

// send
async function send() {
  let text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  let reply = await getAI(text);
  addMessage(reply, "bot");
  speak(reply);
}

// voice
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = "hi-IN";

document.getElementById("mic-btn").onclick = () => rec.start();
rec.onresult = e => {
  input.value = e.results[0][0].transcript;
  send();
};

// speak
function speak(text) {
  let s = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(s);
}

// events
document.getElementById("send-btn").onclick = send;
input.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

// save mode
function saveMode(mode) {
  localStorage.setItem("mode", mode);
}

// save user
function saveUser() {
  let name = document.getElementById("username").value;
  localStorage.setItem("user", name);
}
</script>

</body>
</html>
