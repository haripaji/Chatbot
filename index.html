<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Smart AI - Fixed v2.5</title>
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        body { margin: 0; background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); text-align: center; font-weight: 800; letter-spacing: 2px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; animation: slideUp 0.3s ease-out; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }
        .actions { margin-top: 8px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 15px; font-size: 12px; }
        .actions span { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .actions span:hover { opacity: 1; }
        .input-box { padding: 20px; background: transparent; }
        #input-wrapper { max-width: 800px; margin: 0 auto; background: var(--card); padding: 8px 15px; border-radius: 30px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        #send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; background: var(--primary); color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>VEDA <span style="color:var(--primary)">AI</span></header>

<div id="chat"></div>

<div class="input-box">
    <div id="input-wrapper">
        <input type="text" id="user-input" placeholder="Sawalan poochein ya calculation karein..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>
</div>

<script>
    // --- 1. DATA (Ab isi file mein hai taaki load error na aaye) ---
    const vedaDatabase = {
        "hi": "Hello! Kaise hain aap?",
        "hello": "Namaste! Main Veda AI hoon.",
        "aryan": "Aryan ke novel ka 'Chakra-tech' system kamaal hai!",
        "history": "History ke dates aur events mein main expert hoon.",
        "economics": "Economics ke numericals ya theory? Kya solve karna hai?",
        "math": "Aap calculation (jaise 45*10) likhiye, main foran solve kar dunga."
    };
    const defaultResponse = "Hmm, main samajh nahi paya. Kya aap Math ya apne novel ke baare mein baat kar rahe hain?";

    // --- 2. SELECTIONS ---
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // --- 3. UNIVERSAL LOGIC ---
    function getReply(text) {
        text = text.toLowerCase().trim();

        // MATH CHECK
        const mathPattern = /^[0-9+\-*/().\s]+$/;
        if (mathPattern.test(text) && /[0-9]/.test(text)) {
            try { return `Iska jawab hai: ${eval(text)} 🔢`; } 
            catch (e) { return "Math expression mein galti hai. 😅"; }
        }

        // KEYWORD CHECK
        for (let key in vedaDatabase) {
            if (text.includes(key.toLowerCase())) {
                return vedaDatabase[key];
            }
        }
        return defaultResponse;
    }

    // --- 4. UI FUNCTIONS ---
    function addMessage(text, type) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${type}`;
        
        const content = document.createElement("div");
        content.innerText = text;
        msgDiv.appendChild(content);

        if (type === "bot") {
            const actions = document.createElement("div");
            actions.className = "actions";
            actions.innerHTML = `
                <span onclick="copyT('${text.replace(/'/g, "\\'")}')">📋 Copy</span>
                <span onclick="speakT('${text.replace(/'/g, "\\'")}')">🔊 Listen</span>
            `;
            msgDiv.appendChild(actions);
        }

        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function handleSend() {
        const val = userInput.value.trim();
        if (!val) return;
        addMessage(val, "user");
        userInput.value = "";
        
        setTimeout(() => {
            const reply = getReply(val);
            addMessage(reply, "bot");
        }, 600);
    }

    // --- 5. EVENTS ---
    sendBtn.onclick = handleSend;
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });

    function copyT(t) { navigator.clipboard.writeText(t); alert("Copied!"); }
    function speakT(t) {
        const utter = new SpeechSynthesisUtterance(t);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    // Welcome Msg
    window.onload = () => addMessage("Namaste! Main Veda AI hoon. Buttons ab active hain, try kijiye! 🔮", "bot");
</script>

</body>
</html>
