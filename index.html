<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veda Smart Bot</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
#menu{padding:10px;font-size:22px;cursor:pointer}
#sidebar{
 position:fixed;left:-100%;top:0;width:70%;height:100%;
 background:#222;padding:20px;transition:.3s;z-index:10
}
#sidebar.open{left:0}
.btn{display:block;margin:10px 0;padding:10px;background:#333;border:none;color:#fff;border-radius:20px}

#chat{height:75vh;overflow:auto;padding:10px}
.msg{padding:10px;border-radius:15px;margin:5px;max-width:70%;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.user{background:#333;margin-left:auto}
.bot{background:#555}

#inputArea{
 position:fixed;bottom:20px;width:100%;
 display:flex;gap:10px;padding:10px;box-sizing:border-box
}
#input{flex:1;padding:12px;border-radius:25px;border:none;background:#333;color:#fff}

#mic,#send,#voice{
 width:50px;height:50px;border:none;border-radius:50%;cursor:pointer
}

#mic{background:linear-gradient(45deg,pink,purple)}
#mic.glow{box-shadow:0 0 15px pink}
#send{background:#2196f3}
#voice{background:#00c853}

#credit{
 position:fixed;bottom:0;width:100%;
 text-align:center;font-size:11px;color:#777
}
</style>
</head>

<body>

<div id="menu">☰</div>

<div id="sidebar">
 <button class="btn" onclick="toggleSidebar()">⬅ Back</button>
 <button class="btn" onclick="clearHistory()">🗑 Clear History</button>
 <button class="btn" onclick="feedback()">📩 Feedback</button>
</div>

<div id="chat">
 <div class="msg bot">Namaste 😊 Main Veda Smart Bot hoon</div>
</div>

<div id="inputArea">
 <button id="mic">🎤</button>
 <input id="input" placeholder="Type or speak...">
 <button id="voice">🎧</button>
 <button id="send">➤</button>
</div>

<div id="credit">thoughts sounds bot version 0.001.1</div>

<script>

// ===== ELEMENTS =====
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const mic=document.getElementById("mic");
const voiceBtn=document.getElementById("voice");
const sendBtn=document.getElementById("send");
const sidebar=document.getElementById("sidebar");

// ===== SIDEBAR =====
menu.onclick=()=>toggleSidebar();
function toggleSidebar(){sidebar.classList.toggle("open")}

// ===== USER DATA =====
let userData={
 name:localStorage.getItem("name")||""
};

// ===== UTILS =====
function clean(t){return t.toLowerCase().trim()}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function match(t,arr){return arr.some(w=>t.includes(w))}

// Replace old addMessage() with this fixed version
function addMessage(text,type){
    let d=document.createElement("div");
    d.className="msg "+type;
    d.innerText=text;

    if(type==="bot"){
        let actions=document.createElement("div");
        actions.style.marginTop="5px";
        actions.style.fontSize="14px";
        actions.style.display="flex";
        actions.style.gap="10px";

        let like=document.createElement("span");
        like.innerText="👍";
        like.style.cursor="pointer";
        like.onclick=()=>addMessage("Thanks 😊","bot");

        let dislike=document.createElement("span");
        dislike.innerText="👎";
        dislike.style.cursor="pointer";
        dislike.onclick=()=>addMessage("Sorry 😅 try again","bot");

        let copy=document.createElement("span");
        copy.innerText="📋";
        copy.style.cursor="pointer";
        copy.onclick=()=>navigator.clipboard.writeText(text);

        let speakBtn=document.createElement("span");
        speakBtn.innerText="🔊";
        speakBtn.style.cursor="pointer";
        speakBtn.onclick=()=>speak(text);

        actions.append(like,dislike,copy,speakBtn);
        d.appendChild(actions);
    }

    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
}

// ===== BRAIN =====
function getReply(text){

 text=clean(text);

 // ===== EXPERT BRAIN (UPGRADED) =====

// Expert Response Database
const expertData = {
    greetings: ["Namaste! Main Veda AI hoon, aapka conversation expert. Boliye kaise madad karoon?", "Hello! Ek naye aur intelligent discussion ke liye main taiyaar hoon.", "Swagat hai! Aaj hum kis baare mein baat karenge?"],
    coding: ["Logic build karna coding ki pehli seedhi hai. Kya aapko code optimize karna hai?", "Developer perspective se dekhein toh ye kaafi interesting sawal hai.", "Syntax ki chinta mat kijiye, pehle algorithm par dhyan dein."],
    creative: ["World-building ek art hai. Kya hum aapke 'Aryan' character ya 15th-century world par baat karein?", "Aapka creative vision kaafi unique hai. Ise aur expand karte hain."],
    ai_tech: ["AI fundamentals seekhna aaj ke samay mein bahut zaroori hai. Kya aapne apna roadmap shuru kiya?", "Neural networks aur logic hi AI ki jaan hai."],
    fallback: ["Hmm, main samajh raha hoon. Is par thoda aur detail mein baat karte hain?", "Interesting point! Kya aap ise thoda aur explain karenge?", "Main sun raha hoon, bataiye iske peeche ka kya logic hai?"]
};

function getReply(text) {
    text = text.toLowerCase().trim();

    // 1. NAME SETTING LOGIC
    if (text.includes("mera naam") || text.includes("my name is")) {
        let n = text.split(" ").pop();
        userData.name = n;
        localStorage.setItem("name", n);
        return `Aapse milkar khushi hui, ${n}! Main aapka naam yaad rakhunga.`;
    }

    // 2. EXPERT CONTEXT MATCHING
    if (match(text, ["hi", "hello", "namaste", "hey"])) {
        return rand(expertData.greetings);
    }
    
    if (match(text, ["kaise ho", "how are you"])) {
        return "Main ek Expert AI hoon, hamesha ki tarah optimize aur fast! Aap kaise hain?";
    }

    if (match(text, ["code", "html", "javascript", "fix", "developer"])) {
        return rand(expertData.tech);
    }

    if (match(text, ["story", "novel", "fantasy", "aryan", "chakra"])) {
        return rand(expertData.creative);
    }

    if (match(text, ["ai", "robot", "intelligence", "machine"])) {
        return rand(expertData.ai_tech);
    }

    if (match(text, ["joke", "hasao", "funny"])) {
        return rand([
            "Ek programmer ki life: 10% coding, 90% dhoondhna ki error kahan hai! 😂",
            "Teacher: 2+2 kitna hota hai? Coder: Pehle ye batao ki data type 'Int' hai ya 'String'? 😆",
            "Why do programmers prefer dark mode? Because light attracts bugs! 🤣"
        ]);
    }

    if (match(text, ["time", "samay", "date"])) {
        return "Abhi ka samay hai: " + new Date().toLocaleTimeString();
    }

    // 3. SMART FALLBACK (Expert Style)
    let r = rand(expertData.fallback);
    return (userData.name) ? `${userData.name}, ${r.toLowerCase()}` : r;
}

// ===== IMPROVED SEND & DISPLAY =====
function sendMessage() {
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // Expert style delay for realistic feel
    setTimeout(() => {
        let reply = getReply(text);
        addMessage(reply, "bot");
        
        // Agar voice mode on hai toh bol kar bataye
        if(voiceMode) speak(reply);
    }, 800);
}


// ===== BUTTON EVENTS =====
sendBtn.onclick=sendMessage;
input.addEventListener("keypress",e=>{
 if(e.key==="Enter") sendMessage();
});

// ===== MIC =====
const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="en-IN";

mic.onclick=()=>rec.start();

rec.onstart=()=>mic.classList.add("glow");
rec.onend=()=>mic.classList.remove("glow");
rec.onerror=()=>mic.classList.remove("glow");

let voiceMode=false;

// ===== VOICE MODE =====
voiceBtn.onclick=()=>{
 voiceMode=!voiceMode;
 voiceBtn.innerText=voiceMode?"🛑":"🎧";
 if(voiceMode) rec.start();
};

// ===== SINGLE RESULT =====
rec.onresult=(e)=>{
 let text=e.results[0][0].transcript;

 if(!voiceMode){
  input.value=text;
  sendMessage();
 }else{
  addMessage(text,"user");
  let reply=getReply(text);
  addMessage(reply,"bot");
  speak(reply);
  setTimeout(()=>rec.start(),500);
 }
};

// ===== EXTRA =====
function clearHistory(){
 if(confirm("Clear chat?")) chat.innerHTML="";
}

function feedback(){
 window.location.href="mailto:harendrashrivastav44@gmail.com";
}

</script>

</body>
</html>
