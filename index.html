<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veda Smart Bot</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
#menu{padding:10px;font-size:22px;cursor:pointer}
#sidebar{
 position:fixed;left:-100%;top:0;width:70%;height:100%;
 background:#222;padding:20px;transition:.3s;z-index:10
}
#sidebar.open{left:0}
.btn{display:block;margin:10px 0;padding:10px;background:#333;border:none;color:#fff;border-radius:20px}

#chat{height:75vh;overflow:auto;padding:10px}
.msg{padding:10px;border-radius:15px;margin:5px;max-width:70%;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.user{background:#333;margin-left:auto}
.bot{background:#555}

#inputArea{
 position:fixed;bottom:20px;width:100%;
 display:flex;gap:10px;padding:10px;box-sizing:border-box
}
#input{flex:1;padding:12px;border-radius:25px;border:none;background:#333;color:#fff}

#mic,#send,#voice{
 width:50px;height:50px;border:none;border-radius:50%;cursor:pointer
}

#mic{background:linear-gradient(45deg,pink,purple)}
#mic.glow{box-shadow:0 0 15px pink}
#send{background:#2196f3}
#voice{background:#00c853}

#credit{
 position:fixed;bottom:0;width:100%;
 text-align:center;font-size:11px;color:#777
}
</style>
</head>

<body>

<div id="menu">☰</div>

<div id="sidebar">
 <button class="btn" onclick="toggleSidebar()">⬅ Back</button>
 <button class="btn" onclick="clearHistory()">🗑 Clear History</button>
 <button class="btn" onclick="feedback()">📩 Feedback</button>
</div>

<div id="chat">
 <div class="msg bot">Namaste 😊 Main Veda Smart Bot hoon</div>
</div>

<div id="inputArea">
 <button id="mic">🎤</button>
 <input id="input" placeholder="Type or speak...">
 <button id="voice">🎧</button>
 <button id="send">➤</button>
</div>

<div id="credit">thoughts sounds bot version 0.001.1</div>

<script>

// ===== ELEMENTS =====
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const mic=document.getElementById("mic");
const voiceBtn=document.getElementById("voice");
const sendBtn=document.getElementById("send");
const sidebar=document.getElementById("sidebar");

// ===== SIDEBAR =====
menu.onclick=()=>toggleSidebar();
function toggleSidebar(){sidebar.classList.toggle("open")}

// ===== USER DATA =====
let userData={
 name:localStorage.getItem("name")||""
};

// ===== UTILS =====
function clean(t){return t.toLowerCase().trim()}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function match(t,arr){return arr.some(w=>t.includes(w))}

// ===== ADD MESSAGE (WITH SIMPLE ICONS) =====
function addMessage(text,type){
 let d=document.createElement("div");
 d.className="msg "+type;
 d.innerText=text;

 if(type==="bot"){
  let actions=document.createElement("div");
  actions.style.marginTop="5px";
  actions.style.fontSize="13px";
  actions.style.display="flex";
  actions.style.gap="8px";

  let like=document.createElement("span");
  like.innerText="👍";
  like.onclick=()=>addMessage("Thanks 😊","bot");

  let dislike=document.createElement("span");
  dislike.innerText="👎";
  dislike.onclick=()=>addMessage("Sorry 😅 try again","bot");

  let copy=document.createElement("span");
  copy.innerText="📋";
  copy.onclick=()=>navigator.clipboard.writeText(text);

  let speakBtn=document.createElement("span");
  speakBtn.innerText="🔊";
  speakBtn.onclick=()=>speak(text);

  actions.append(like,dislike,copy,speakBtn);
  d.appendChild(actions);
 }

 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

// ===== BRAIN =====
function getReply(text){

 text=clean(text);

 // NAME SET
 if(match(text,["my name is","mera naam","i am","main hoon"])){
  let n=text.split(" ").pop();
  userData.name=n;
  localStorage.setItem("name",n);
  return "Nice to meet you "+n+" 😊";
 }

 // NAME ASK
 if(match(text,["mera naam kya hai","what is my name"])){
  return userData.name 
   ? "Tumhara naam "+userData.name+" hai 😎"
   : "Mujhe abhi tumhara naam nahi pata 😅";
 }

 // GREETING
 if(match(text,["hello","hi","hey","helo","hii","namaste","yo"])){
  return rand([
   "Hello 😊 kaise ho?",
   "Hi 👋 kya haal hai?",
   "Hey 😄 kya chal raha hai?"
  ]);
 }

 // HOW ARE YOU
 if(match(text,["kaise ho","how are you","kese ho","kya haal"])){
  return rand([
   "Main badhiya hoon 😄 tum batao?",
   "Sab mast 👍 tum kaise ho?"
  ]);
 }

 // HELP
 if(match(text,["help","madad","assist"])){
  return "Main help ke liye hoon 😊 batao kya chahiye";
 }

 // HAPPY
 if(match(text,["happy","khush","awesome","mast","great"])){
  return "Nice 😄 ye sunke accha laga!";
 }

 // SAD
 if(match(text,["sad","dukhi","tension","stress","problem"])){
  return "Kya hua? 😔 batao main sun raha hoon";
 }

 // THANKS
 if(match(text,["thanks","thank you","thx"])){
  return "You're welcome 😊";
 }

 // BYE
 if(match(text,["bye","goodbye"])){
  return "Bye 👋 phir milte hain";
 }

 // JOKE
 if(match(text,["joke","funny","hasao"])){
  return rand([
   "😂 coder kabhi sota nahi",
   "🤣 bug hi life ban gaya",
   "😆 computer ko thand lag gayi"
  ]);
 }

 // DATE
 if(match(text,[
  "date","aaj ki date","today date","date kya hai",
  "what is the date","aaj kya date hai","today"
 ])){
  let d=new Date();
  let options={weekday:'long',year:'numeric',month:'long',day:'numeric'};
  return "Aaj hai "+d.toLocaleDateString("en-IN",options)+" 📅";
 }

 // TIME
 if(match(text,[
  "time","samay","time kya hai","what is time","abhi time"
 ])){
  let t=new Date();
  return "Abhi time hai "+t.toLocaleTimeString("en-IN")+" ⏰";
 }

 // DEFAULT
 let r=rand([
  "Samajh nahi aaya 🤔 thoda aur batao",
  "Interesting 😄 aur bolo",
  "Main sun raha hoon 👀",
  "Thoda aur explain karo 😊"
 ]);

 if(userData.name && Math.random()<0.3){
  r=userData.name+", "+r;
 }

 return r;
}

// ===== SEND =====
function sendMessage(){
 let text=input.value.trim();
 if(!text) return;

 addMessage(text,"user");
 input.value="";

 let reply=getReply(text);
 setTimeout(()=>addMessage(reply,"bot"),400);
 }

// ===== MESSAGE =====
function addMessage(text,type){
 let d=document.createElement("div");
 d.className="msg "+type;
 d.innerText=text;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

// ===== SPEAK =====

 speechSynthesis.cancel();
 let u=new SpeechSynthesisUtterance(text);
 u.lang="en-IN";
 speechSynthesis.speak(u);
}

 }

 }

// ===== SEND =====
function sendMessage(){
 let text=input.value.trim();
 if(!text) return;

 addMessage(text,"user");
 input.value="";

 let reply=getReply(text);
 setTimeout(()=>addMessage(reply,"bot"),400);
}

// ===== BUTTON EVENTS =====
sendBtn.onclick=sendMessage;
input.addEventListener("keypress",e=>{
 if(e.key==="Enter") sendMessage();
});

// ===== MIC =====
const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="en-IN";

mic.onclick=()=>rec.start();

rec.onstart=()=>mic.classList.add("glow");
rec.onend=()=>mic.classList.remove("glow");
rec.onerror=()=>mic.classList.remove("glow");

let voiceMode=false;

// ===== VOICE MODE =====
voiceBtn.onclick=()=>{
 voiceMode=!voiceMode;
 voiceBtn.innerText=voiceMode?"🛑":"🎧";
 if(voiceMode) rec.start();
};

// ===== SINGLE RESULT =====
rec.onresult=(e)=>{
 let text=e.results[0][0].transcript;

 if(!voiceMode){
  input.value=text;
  sendMessage();
 }else{
  addMessage(text,"user");
  let reply=getReply(text);
  addMessage(reply,"bot");
  speak(reply);
  setTimeout(()=>rec.start(),500);
 }
};

// ===== EXTRA =====
function clearHistory(){
 if(confirm("Clear chat?")) chat.innerHTML="";
}

function feedback(){
 window.location.href="mailto:harendrashrivastav44@gmail.com";
}

</script>

</body>
</html>
