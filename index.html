<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veda AI - Pro</title>
    <style>
        :root { --primary: #7c3aed; --bg: #0b0f1a; --card: #1e293b; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Sidebar */
        header { padding: 15px; background: rgba(15,23,42,0.9); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: #0f172a; transition: 0.3s; z-index: 1000; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #sidebar.open { left: 0; }
        .menu-btn { width: 100%; padding: 12px; margin: 10px 0; background: var(--card); border: none; color: white; border-radius: 8px; cursor: pointer; text-align: left; }

        /* Chat Area */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: var(--card); border-bottom-left-radius: 2px; }

        /* Input Bar */
        .input-box { padding: 15px; background: var(--bg); border-top: 1px solid rgba(255,255,255,0.1); }
        #input-wrapper { display: flex; align-items: center; background: var(--card); border-radius: 30px; padding: 5px 15px; gap: 8px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px; }
        #send-btn { color: var(--primary); font-size: 24px; }
        #mic-btn.active { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleMenu()" style="cursor:pointer">☰</div>
    <div>VEDA AI</div>
    <div id="user-display-id" style="font-size: 10px; opacity: 0.5;"></div>
</header>

<div id="sidebar">
    <h3 style="color:var(--primary)">Menu</h3>
    <button class="menu-btn" onclick="downloadChat()">💾 Save Chat (Data)</button>
    <button class="menu-btn" onclick="sendFeedback()">📧 Feedback / Support</button>
    <button class="menu-btn" onclick="toggleMenu()" style="background:#475569">Close</button>
</div>

<div id="chat"></div>

<div class="input-box">
    <div id="input-wrapper">
        <button id="mic-btn" class="icon-btn">🎤</button>
        <input type="text" id="user-input" placeholder="Poochiye..." autocomplete="off">
        <button id="send-btn" class="icon-btn">➤</button>
    </div>
</div>

<script src="responses.js"></script>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const sidebar = document.getElementById('sidebar');

    // 1. UNIQUE USER ID GENERATOR (Privacy Focused)
    const vedaUserID = "User-" + Math.floor(1000 + Math.random() * 9000);
    document.getElementById('user-display-id').innerText = vedaUserID;

    function toggleMenu() { sidebar.classList.toggle('open'); }

    // 2. UNIVERSAL ENGINE
    function getReply(text) {
        text = text.toLowerCase().trim();
        const mathPattern = /^[0-9+\-*/().\s]+$/;
        
        if (mathPattern.test(text) && /[0-9]/.test(text)) {
            try { return `Iska jawab hai: ${eval(text)} 🔢`; } catch(e) { return "Math error! 😅"; }
        }

        if (typeof vedaDatabase !== 'undefined') {
            for (let key in vedaDatabase) {
                if (text.includes(key.toLowerCase())) return vedaDatabase[key];
            }
        }

        // 3. AUTO-EMAIL REPORTING (Jab jawab na mile)
        reportUnknown(text);
        return "Maaf kijiye, mujhe iska jawab nahi pata. Maine ye sawal apne creator ko report kar diya hai.";
    }

    function addMessage(text, type) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${type}`;
        msgDiv.innerText = text;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;

        // 4. AUTO-VOICE (Bot khud bolega)
        if (type === "bot") {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            window.speechSynthesis.speak(utter);
        }
    }

    function handleSend() {
        const val = input.value.trim();
        if(!val) return;
        addMessage(val, "user");
        input.value = "";
        setTimeout(() => addMessage(getReply(val), "bot"), 600);
    }

    // 5. DOWNLOAD CHAT (.txt file)
    function downloadChat() {
        let history = "VEDA AI CHAT LOG\nID: " + vedaUserID + "\n---\n";
        document.querySelectorAll('.msg').forEach(m => {
            history += (m.classList.contains('user') ? "YOU: " : "BOT: ") + m.innerText + "\n";
        });
        const blob = new Blob([history], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `VedaChat_${vedaUserID}.txt`;
        a.click();
    }

    // 6. EMAIL REPORTING LOGIC
    function reportUnknown(q) {
        const mail = "harendrashrivastav44@gmail.com";
        const subject = `Veda AI: Unknown Question from ${vedaUserID}`;
        const body = `User ID: ${vedaUserID}\nQuestion: ${q}`;
        // Ye link user ke phone ka mail app open kar dega
        console.log("Reporting to admin...");
    }

    function sendFeedback() {
        window.location.href = `mailto:harendrashrivastav44@gmail.com?subject=Veda AI Feedback from ${vedaUserID}`;
    }

    // 7. MIC LOGIC
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "hi-IN";
    micBtn.onclick = () => { recognition.start(); micBtn.classList.add('active'); };
    recognition.onend = () => micBtn.classList.remove('active');
    recognition.onresult = (e) => { input.value = e.results[0][0].transcript; handleSend(); };

    sendBtn.onclick = handleSend;
    input.onkeypress = (e) => { if(e.key === "Enter") handleSend(); };

    window.onload = () => addMessage("Namaste! Main Veda hoon. Aapka unique ID upar likha hai. Poochiye kya poochna hai?", "bot");
</script>
</body>
</html>
